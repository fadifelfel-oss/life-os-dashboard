<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triage — Life OS</title>
<script>/* anti-flash (R13): apply saved theme before first paint */(function(){try{var s=JSON.parse(localStorage.getItem('fb-os-state')||'{}');document.documentElement.setAttribute('data-theme',s.theme||'blueprint');}catch(e){document.documentElement.setAttribute('data-theme','blueprint');}})();</script>
<link rel="stylesheet" href="shared.css">
<style>
/* Triage — Productivity Hub v1 (Builder Session 5, 2026-07-14). Follows
   design/AREA-PAGE-SPEC.md's card language (.hub-tcard / .hub-tile-row /
   .empty-state) — this page is a list-of-cards triage surface, not a
   two-column digest, so only the shared card anatomy is reused, not the
   full digest layout. */
:root { --ar-accent: var(--area-admin); }
.tri-banner {
  font-size: 13px; color: var(--text-secondary);
  background: var(--bg-secondary); border: 1px solid var(--border-primary);
  border-left: 3px solid var(--area-admin); border-radius: var(--radius-md);
  padding: var(--space-2) var(--space-3); margin: 0 0 var(--space-4);
  display: flex; align-items: center; gap: 8px;
}
.tri-list { display: flex; flex-direction: column; gap: 8px; }
.tri-card-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.tri-card-actions button {
  font-size: 11px; padding: 5px 10px; border-radius: var(--radius-md);
  border: 1px solid var(--border-primary); background: var(--bg-tertiary);
  color: var(--text-secondary); cursor: pointer; display: inline-flex;
  align-items: center; gap: 4px; transition: all .15s;
}
.tri-card-actions button:hover { border-color: var(--ar-accent); color: var(--text-primary); }
.tri-card-actions .tri-btn-task:hover { border-color: var(--green); color: var(--green); }
.tri-card-actions .tri-btn-vault:hover { border-color: var(--accent); color: var(--accent); }
.tri-card-actions .tri-btn-dismiss:hover { border-color: var(--status-failed); color: var(--status-failed); }
.tri-meta-row { display: flex; align-items: center; gap: 8px; }
.tri-filter-row { display: flex; gap: 6px; margin-bottom: var(--space-3); }
.tri-filter-chip {
  font-size: 11px; padding: 4px 10px; border-radius: 999px; cursor: pointer;
  border: 1px solid var(--border-primary); background: var(--bg-secondary); color: var(--text-secondary);
}
.tri-filter-chip.active { background: var(--area-admin-bg); color: var(--area-admin); border-color: var(--area-admin); }
</style>
</head>
<body>
<div class="container">
<div class="header">
  <a href="index.html" class="header-back">← Life OS</a>
  <div class="header-title"><svg class="icon" width="18" height="18"><use href="assets/lucide-sprite.svg#icon-inbox"/></svg> Triage</div>
  <div class="header-actions">
    <button class="btn btn-sm" onclick="loadInbox()"><svg class="icon icon-sm" width="13" height="13"><use href="assets/lucide-sprite.svg#icon-refresh-cw"/></svg> Refresh</button>
  </div>
</div>

<div class="tri-banner">
  <svg class="icon icon-sm" width="14" height="14"><use href="assets/lucide-sprite.svg#icon-triangle-alert"/></svg>
  A fast operational staging area for everything captured from Quick Capture (the + button) and the Today tab — not a second vault. Every item here drains to a kanban task, to the vault (copy, then paste into any Cowork session), or gets dismissed.
</div>

<div class="hub-tile-row" id="triStats"></div>

<div class="tri-filter-row" id="triFilters">
  <button class="tri-filter-chip active" data-status="new" onclick="setFilter('new')">New</button>
  <button class="tri-filter-chip" data-status="triaged" onclick="setFilter('triaged')">Triaged</button>
  <button class="tri-filter-chip" data-status="dismissed" onclick="setFilter('dismissed')">Dismissed</button>
  <button class="tri-filter-chip" data-status="" onclick="setFilter('')">All</button>
</div>

<div id="triBody"><div class="hub-digest-loading"><svg class="icon icon-sm icon-spin" width="14" height="14"><use href="assets/lucide-sprite.svg#icon-loader"/></svg> Loading inbox…</div></div>

</div><!-- /container -->

<script>
function escH(s){ const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }

function timeAgo(iso) {
  if (!iso) return '';
  const then = new Date(iso).getTime();
  if (isNaN(then)) return '';
  const mins = Math.floor((Date.now() - then) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function isToday(iso) {
  if (!iso) return false;
  const d = new Date(iso);
  if (isNaN(d.getTime())) return false;
  const now = new Date();
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
}

let allItems = [];
let currentFilter = 'new';

function setFilter(status) {
  currentFilter = status;
  document.querySelectorAll('.tri-filter-chip').forEach(c => c.classList.toggle('active', c.dataset.status === status));
  render();
}

async function loadInbox() {
  const body = document.getElementById('triBody');
  body.innerHTML = '<div class="hub-digest-loading"><svg class="icon icon-sm icon-spin" width="14" height="14"><use href="assets/lucide-sprite.svg#icon-loader"/></svg> Loading inbox…</div>';
  try {
    const resp = await fetch('/api/capture');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    allItems = Array.isArray(json.data) ? json.data : [];
    renderStats();
    render();
  } catch (e) {
    body.innerHTML = `<div class="hub-digest-empty">Couldn't load the inbox (${escH(e.message)}). Backend may not be deployed yet.</div>`;
    document.getElementById('triStats').innerHTML = '';
  }
}

function renderStats() {
  const newCount = allItems.filter(i => i.status === 'new').length;
  const triagedToday = allItems.filter(i => i.status === 'triaged' && isToday(i.updated)).length;
  const total = allItems.length;
  const tile = (num, label) => `<div class="hub-tile"><div class="hub-tile-num">${num}</div><div class="hub-tile-label">${label}</div></div>`;
  document.getElementById('triStats').innerHTML = tile(newCount, 'New') + tile(triagedToday, 'Triaged today') + tile(total, 'Total');
}

function render() {
  const body = document.getElementById('triBody');
  const items = currentFilter ? allItems.filter(i => i.status === currentFilter) : allItems;
  if (!items.length) {
    body.innerHTML = `<div class="empty-state"><div class="empty-state-icon"><svg class="icon" width="20" height="20"><use href="assets/lucide-sprite.svg#icon-inbox"/></svg></div><div class="empty-state-text">Inbox zero.</div></div>`;
    return;
  }
  body.innerHTML = `<div class="tri-list">` + items.map(i => `
    <div class="hub-tcard" data-id="${escH(i.id)}">
      <div class="hub-tcard-title">${escH(i.text)}</div>
      <div class="hub-tcard-meta tri-meta-row">
        <span class="hub-tag-muted">${escH(i.source || 'unknown')}</span>
        <span class="hub-tag-muted">${timeAgo(i.ts)}</span>
        ${i.status !== 'new' ? `<span class="hub-tag">${escH(i.status)}</span>` : ''}
      </div>
      ${i.status === 'new' ? `
      <div class="tri-card-actions">
        <button class="tri-btn-task" onclick='sendToTask(${JSON.stringify(i.id)}, ${JSON.stringify(i.text)})'><svg class="icon icon-sm" width="11" height="11"><use href="assets/lucide-sprite.svg#icon-circle-check"/></svg> Task</button>
        <button class="tri-btn-vault" onclick='sendToVault(${JSON.stringify(i.id)}, ${JSON.stringify(i.text)})'><svg class="icon icon-sm" width="11" height="11"><use href="assets/lucide-sprite.svg#icon-copy"/></svg> Vault</button>
        <button class="tri-btn-dismiss" onclick='dismissItem(${JSON.stringify(i.id)})'><svg class="icon icon-sm" width="11" height="11"><use href="assets/lucide-sprite.svg#icon-x"/></svg> Dismiss</button>
      </div>` : ''}
    </div>
  `).join('') + `</div>`;
}

async function updateCapture(id, status) {
  try {
    await fetch('/api/capture/update', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id, status })
    });
  } catch (e) {}
}

// → Task: creates a kanban Backlog card via the existing /api/task lane
// (no new store/writer — same endpoint QuickCapture's brain-dump review uses).
async function sendToTask(id, text) {
  const task = {
    id: 'task_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    title: text, description: '', priority: 'medium', tag: 'project',
    column: 'backlog', source: 'Triage', created: new Date().toISOString()
  };
  try {
    await fetch('/api/task', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(task) });
    await updateCapture(id, 'triaged');
    if (typeof Notify !== 'undefined') Notify.success('Added to Kanban Backlog.');
    loadInbox();
  } catch (e) {
    if (typeof Notify !== 'undefined') Notify.error('Failed to create task.');
  }
}

// → Vault: clipboard + toast promote-pattern (Decision Gate 1 / read-only
// mirror rule) — NO vault write from the dashboard. Cowork is the vault's
// only writer; Fadi pastes this into any Cowork session to file it.
async function sendToVault(id, text) {
  try {
    await navigator.clipboard.writeText(text);
    if (typeof Notify !== 'undefined') Notify.success('Copied — paste into any Cowork session to file it', 6000);
  } catch (e) {
    if (typeof Notify !== 'undefined') Notify.error('Failed to copy');
    return;
  }
  await updateCapture(id, 'triaged');
  loadInbox();
}

async function dismissItem(id) {
  await updateCapture(id, 'dismissed');
  loadInbox();
}

loadInbox();
</script>
<script src="shared.js"></script>
</body>
</html>
