<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM — Life OS</title>
<script>/* anti-flash (R13): apply saved theme before first paint */(function(){try{var s=JSON.parse(localStorage.getItem('fb-os-state')||'{}');document.documentElement.setAttribute('data-theme',s.theme||'blueprint');}catch(e){document.documentElement.setAttribute('data-theme','blueprint');}})();</script>
<link rel="stylesheet" href="shared.css">
<style>
.crm-banner {
  font-size: 13px; color: var(--text-secondary);
  background: var(--bg-secondary); border: 1px solid var(--border-primary);
  border-left: 3px solid var(--area-fieldbridge); border-radius: var(--radius-md);
  padding: var(--space-2) var(--space-3); margin: 0 0 var(--space-4);
  display: flex; align-items: center; gap: 8px;
}
.crm-board { display: flex; gap: var(--space-3); overflow-x: auto; padding-bottom: var(--space-3); }
.crm-col { flex: 0 0 260px; display: flex; flex-direction: column; }
.crm-col-head {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--text-tertiary); padding: 0 4px var(--space-2);
  border-bottom: 2px solid var(--area-fieldbridge); margin-bottom: var(--space-2);
}
.crm-col-count { color: var(--text-muted); }
.crm-col-body { display: flex; flex-direction: column; gap: 8px; }
.crm-card {
  background: var(--bg-secondary); border: 1px solid var(--border-primary);
  border-radius: var(--radius-lg); padding: var(--space-3);
  cursor: pointer; transition: border-color .15s, transform .1s; text-decoration: none; display: block;
}
.crm-card:hover { border-color: var(--area-fieldbridge); transform: translateY(-1px); }
.crm-card-name { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.crm-card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.crm-tag { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; padding: 1px 7px; border-radius: var(--radius-full); border: 1px solid var(--border-primary); color: var(--text-tertiary); white-space: nowrap; }
.crm-empty { color: var(--text-muted); font-size: 14px; padding: var(--space-5); text-align: center; }
.crm-empty a { color: var(--accent); text-decoration: none; }
.crm-loading { color: var(--text-muted); font-size: 14px; padding: var(--space-4); display: flex; align-items: center; gap: 8px; }
.crm-sync-note { font-size: 12px; color: var(--text-muted); margin-left: 8px; }
</style>
</head>
<body>
<div class="container">
<div class="header">
  <a href="index.html" class="header-back">← Life OS</a>
  <div class="header-title"><svg class="icon" width="18" height="18"><use href="assets/lucide-sprite.svg#icon-users"/></svg> CRM — FieldBridge Pipeline</div>
  <div class="header-actions">
    <button class="btn btn-sm" onclick="loadCrm()"><svg class="icon icon-sm" width="13" height="13"><use href="assets/lucide-sprite.svg#icon-refresh-cw"/></svg> Refresh</button>
  </div>
</div>

<div class="crm-banner">
  <svg class="icon icon-sm" width="14" height="14"><use href="assets/lucide-sprite.svg#icon-lock"/></svg>
  Read-only view of the FieldBridge CRM. Notion is the system of record; Cowork's nightly sync pulls Notion → vault and this dashboard reads that mirror. Edits happen in Notion/Cowork, never here.
</div>

<div id="crmBody"><div class="crm-loading"><svg class="icon icon-sm icon-spin" width="14" height="14"><use href="assets/lucide-sprite.svg#icon-loader"/></svg> Loading pipeline…</div></div>

</div><!-- /container -->

<script>
function escH(s){ const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }

// Stage sort: honor a leading number ("2 · Discovery") else push to the end alphabetically.
function stageOrder(stage){
  const m = String(stage || '').match(/^\s*(\d+)/);
  return m ? parseInt(m[1], 10) : 999;
}

async function loadCrm(){
  const body = document.getElementById('crmBody');
  try {
    const res = await fetch('/api/wiki/crm');
    const json = await res.json();
    // Skip non-client files that live in CRM/ (index.md, readme) so only real clients show.
    const rows = ((json && json.data) || []).filter(r => {
      const base = String(r.path || '').split('/').pop().toLowerCase();
      const name = String(r.company || '').toLowerCase();
      return base !== 'index.md' && name !== 'index' && name !== 'readme';
    });
    if (!rows.length) {
      body.innerHTML = '<div class="crm-empty">No clients synced yet.<br><br>Click <strong>Sync from Notion</strong> above to pull your Client Pipeline.<br><span style="font-size:12px;">(Make sure the CRM database is shared with the "Life OS Dashboard" Notion integration.)</span></div>';
      return;
    }
    // group by stage
    const groups = {};
    rows.forEach(r => {
      const st = r.stage || 'Unstaged';
      (groups[st] = groups[st] || []).push(r);
    });
    const stages = Object.keys(groups).sort((a,b) => stageOrder(a) - stageOrder(b) || a.localeCompare(b));
    body.innerHTML = '<div class="crm-board">' + stages.map(st => `
      <div class="crm-col">
        <div class="crm-col-head"><span>${escH(st)}</span><span class="crm-col-count">${groups[st].length}</span></div>
        <div class="crm-col-body">
          ${groups[st].map(r => `
            <a class="crm-card" href="files.html?path=${encodeURIComponent(r.path || '')}">
              <div class="crm-card-name">${escH(r.company)}</div>
              <div class="crm-card-meta">
                ${r.trade ? `<span class="crm-tag">${escH(r.trade)}</span>` : ''}
                ${r.region ? `<span class="crm-tag">${escH(r.region)}</span>` : ''}
              </div>
            </a>`).join('')}
        </div>
      </div>`).join('') + '</div>';
  } catch (e) {
    body.innerHTML = `<div class="crm-empty">Couldn't load the CRM (${escH(e.message)}). The server may need a restart.</div>`;
  }
}

document.addEventListener('DOMContentLoaded', loadCrm);
</script>
</body>
</html>
