<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Explorer — Life OS</title>
  <link rel="stylesheet" href="shared.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --bg: #0d1117; --bg-card: #161b22; --bg-card-hover: #1c2128;
      --border: #30363d; --text: #e6edf3; --text-muted: #8b949e;
      --accent: #58a6ff; --red: #f85149; --green: #3fb950;
      --purple: #bc8cff; --cyan: #39d2c0; --pink: #f778ba; --orange: #d29922;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
    }
    .header {
      display:flex; justify-content:space-between; align-items:center;
      padding:16px 24px; background:var(--bg-card);
      border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100;
    }
    .header h1 { font-size:18px; font-weight:700; }
    .header-back {
      color: var(--accent); text-decoration:none;
      font-size: 15px; font-weight: 600;
      padding: 8px 14px; border-radius: 8px;
      background: rgba(88,166,255,0.1);
      border: 1px solid rgba(88,166,255,0.25);
      transition: all 0.2s;
    }
    .header-back:hover {
      background: rgba(88,166,255,0.2);
      color: #79c0ff;
    }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 12px;
      padding: 16px 24px; background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }
    .toolbar .input {
      flex: 1; min-width: 200px;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px; font-size: 14px;
    }
    .toolbar .label {
      font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 4px; display: block;
    }
    .domain-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
      cursor: pointer; user-select: none;
      border: 1px solid transparent;
    }
    .domain-chip input { margin: 0; }
    .tab-container {
      flex: 1; display: flex; overflow: hidden;
    }
    .tab-list {
      display: flex; flex-direction: column;
      min-width: 140px; border-right: 1px solid var(--border);
      background: var(--bg-card);
    }
    .tab-button {
      padding: 14px 16px; text-align: left;
      background: none; border: none;
      color: var(--text-muted);
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      cursor: pointer; transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .tab-button:hover { background: var(--bg-card-hover); color: var(--text); }
    .tab-button.active {
      color: var(--accent); background: var(--bg);
      border-left-color: var(--accent);
    }
    .tab-panel {
      flex: 1; overflow: hidden; padding: 16px;
      position: relative;
    }
    .tab-panel.hidden { display: none; }
    /* Graph styles */
    #graph-svg {
      width: 100%; height: 100%;
      cursor: grab;
    }
    #graph-svg:active { cursor: grabbing; }
    .link { stroke: rgba(255,255,255,0.12); stroke-width: 1px; }
    .node circle { transition: r 0.2s; cursor: pointer; }
    .node:hover circle { stroke: var(--accent); stroke-width: 2.5px; }
    .node text { font-size: 10px; fill: var(--text); pointer-events: none; }
    .graph-tooltip {
      position: absolute; background: rgba(22,27,34,0.96);
      border: 1px solid var(--accent); border-radius: 8px;
      padding: 8px 12px; font-size: 11px; pointer-events: none;
      z-index: 200; display: none; max-width: 240px;
    }
    .graph-empty {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 14px;
    }
    /* Tree view */
    .tree-view { display: flex; flex-direction: column; gap: 16px; overflow-y: auto; height: 100%; }
    .tree-domain { margin-bottom: 8px; }
    .tree-domain-title {
      font-size: 13px; font-weight: 700;
      padding: 8px 12px; border-radius: 6px;
      background: var(--bg-card); color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    .tree-files { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 0 8px 12px; }
    .tree-file {
      font-size: 12px; padding: 5px 10px;
      border-radius: 6px; background: var(--bg-card-hover);
      color: var(--text-muted); cursor: pointer;
      text-decoration: none; border: 1px solid transparent;
    }
    .tree-file:hover { color: var(--accent); border-color: var(--accent); }
    /* Table view */
    table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--bg-card); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    tr:hover td { background: var(--bg-card-hover); }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 10px; text-transform: uppercase; font-weight: 600;
    }
    .badge.ai-tools { background: var(--accent); color: #fff; }
    .badge.construction { background: var(--green); color: #fff; }
    .badge.fieldbridgehq { background: var(--purple); color: #fff; }
    .badge.general { background: var(--orange); color: #fff; }
    .badge.health { background: var(--red); color: #fff; }
    .badge.trading { background: var(--cyan); color: #000; }
    .badge.career { background: var(--pink); color: #fff; }
    /* Responsive */
    @media (max-width: 768px) {
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar .input { width: 100%; }
      .tab-list { min-width: 100px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="header-back">← Life OS</a>
    <h1>Knowledge Explorer</h1>
    <a href="graph3d.html" class="header-back">3D View →</a>
  </div>

  <div class="toolbar">
    <div style="flex:1;min-width:260px;">
      <div class="label">Search</div>
      <input type="text" class="input" id="search-input" placeholder="Search pages by name or content...">
    </div>
    <div>
      <div class="label">Domains</div>
      <div id="domain-list"></div>
    </div>
  </div>

  <div class="tab-container">
    <div class="tab-list">
      <button class="tab-button active" data-tab="graph">🕸️ Graph</button>
      <button class="tab-button" data-tab="tree">🌳 Tree</button>
      <button class="tab-button" data-tab="table">📋 Table</button>
    </div>
    <div class="tab-panel" id="tab-graph">
      <svg id="graph-svg"></svg>
      <div class="graph-tooltip" id="graph-tooltip"></div>
      <div class="graph-empty" id="graph-empty">Loading knowledge graph…</div>
    </div>
    <div class="tab-panel hidden" id="tab-tree">
      <div class="tree-view" id="tree-view"></div>
    </div>
    <div class="tab-panel hidden" id="tab-table">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Domain</th>
            <th>Links</th>
            <th>Path</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    let allNodes = [];
    let filteredNodes = [];
    let links = [];
    let domainSet = new Set();
    let selectedDomains = new Set();
    let searchTerm = '';

    const graphTab = document.getElementById('tab-graph');
    const treeTab = document.getElementById('tab-tree');
    const tableTab = document.getElementById('tab-table');
    const graphButtons = document.querySelectorAll('.tab-button');
    const searchInput = document.getElementById('search-input');
    const domainListDiv = document.getElementById('domain-list');
    const graphSvg = document.getElementById('graph-svg');
    const graphTooltip = document.getElementById('graph-tooltip');
    const graphEmpty = document.getElementById('graph-empty');
    const treeView = document.getElementById('tree-view');
    const tableBody = document.getElementById('table-body');

    const DOMAIN_COLORS = {
      'ai-tools': '#58a6ff',
      'construction': '#3fb950',
      'fieldbridgehq': '#bc8cff',
      'general': '#d29922',
      'health': '#f85149',
      'trading': '#39d2c0',
      'career': '#f778ba'
    };

    graphButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        graphButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
        const tab = document.getElementById('tab-' + btn.dataset.tab);
        if (tab) tab.classList.remove('hidden');
        if (btn.dataset.tab === 'graph') renderGraph();
        else if (btn.dataset.tab === 'tree') renderTree();
        else if (btn.dataset.tab === 'table') renderTable();
      });
    });

    searchInput.addEventListener('input', (e) => {
      searchTerm = e.target.value.toLowerCase();
      filterAndRender();
    });

    async function init() {
      try {
        const resp = await fetch('/api/wiki');
        const result = await resp.json();
        allNodes = (result.data || []).map((node, idx) => ({ ...node, indexId: idx }));
        if (!allNodes.length) {
          graphEmpty.textContent = 'No wiki pages found.';
          return;
        }
        allNodes.forEach(node => {
          const domain = node.domain || node.folder || 'general';
          domainSet.add(domain);
        });
        domainSet.forEach(domain => selectedDomains.add(domain));
        buildLinks();
        renderDomainFilters();
        filterAndRender();
      } catch (e) {
        console.error('Failed to load wiki:', e);
        graphEmpty.textContent = 'Failed to load knowledge data.';
      }
    }

    function buildLinks() {
      const nameMap = {};
      allNodes.forEach(node => {
        const key = (node.title || node.id || '').toLowerCase();
        if (key) nameMap[key] = node;
      });
      links = [];
      allNodes.forEach(node => {
        const content = node.rawContent || '';
        const matches = content.match(/\[\[([^\]]+)\]\]/g) || [];
        matches.forEach(m => {
          const targetName = m.replace(/\[\[|\]\]/g, '').trim().toLowerCase();
          const sourceNode = node;
          const targetNode = nameMap[targetName];
          if (sourceNode && targetNode && sourceNode !== targetNode) {
            links.push({ source: sourceNode.indexId, target: targetNode.indexId });
          }
        });
      });
    }

    function buildFilteredLinks() {
      const filteredIds = new Set(filteredNodes.map(n => n.indexId));
      const filteredLinks = [];
      links.forEach(link => {
        if (filteredIds.has(link.source) && filteredIds.has(link.target)) {
          filteredLinks.push(link);
        }
      });
      return filteredLinks;
    }

    function renderDomainFilters() {
      const domains = Array.from(domainSet).sort();
      domainListDiv.innerHTML = domains.map(domain => {
        const checked = selectedDomains.has(domain) ? 'checked' : '';
        const color = DOMAIN_COLORS[domain] || '#888';
        return `
          <label class="domain-chip" style="background:rgba(22,27,34,0.9);border-color:${color};color:${color};">
            <input type="checkbox" data-domain="${domain}" ${checked}>
            <span>${domain}</span>
          </label>
        `;
      }).join('');
      domainListDiv.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', (e) => {
          const domain = e.target.dataset.domain;
          if (e.target.checked) selectedDomains.add(domain);
          else selectedDomains.delete(domain);
          filterAndRender();
        });
      });
    }

    function filterAndRender() {
      filteredNodes = allNodes.filter(node => {
        const domain = node.domain || node.folder || 'general';
        const text = [node.title, node.id, node.rawContent].join(' ').toLowerCase();
        const matchesSearch = !searchTerm || text.includes(searchTerm);
        return matchesSearch && selectedDomains.has(domain);
      });
      const activeBtn = document.querySelector('.tab-button.active');
      if (!activeBtn) return;
      if (activeBtn.dataset.tab === 'graph') renderGraph();
      else if (activeBtn.dataset.tab === 'tree') renderTree();
      else if (activeBtn.dataset.tab === 'table') renderTable();
    }

    function getNodeLinkCount(node) {
      return links.filter(l => l.source === node.indexId || l.target === node.indexId).length;
    }

    // --- Graph Render ---
    let currentSimulation = null;
    function renderGraph() {
      graphSvg.innerHTML = '';
      graphTooltip.style.display = 'none';
      if (currentSimulation) currentSimulation.stop();

      if (filteredNodes.length === 0) {
        graphEmpty.textContent = 'No nodes match the current filters.';
        graphEmpty.style.display = 'flex';
        return;
      }
      graphEmpty.style.display = 'none';

      const rect = graphTab.getBoundingClientRect();
      const width = rect.width - 32;
      const height = rect.height - 32;
      graphSvg.setAttribute('viewBox', `0 0 ${width} ${height}`);

      const activeLinks = buildFilteredLinks();
      const nodeColor = d => DOMAIN_COLORS[d.domain || d.folder || 'general'] || '#888';

      // Map link source/target to node indices for simulation
      const linkData = activeLinks.map(l => ({ source: l.source, target: l.target }));
      const nodeData = filteredNodes.map(n => ({ ...n, radius: 5 + Math.min(getNodeLinkCount(n), 12) }));

      const simulation = d3.forceSimulation(nodeData)
        .force('charge', d3.forceManyBody().strength(-250))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('link', d3.forceLink(linkData).id(d => d.indexId).distance(90))
        .force('collide', d3.forceCollide().radius(d => d.radius + 3));
      currentSimulation = simulation;

      const g = graphSvg.appendChild(document.createElementNS('http://www.w3.org/2000/svg', 'g'));

      const linkSel = d3.select(g).append('g')
        .selectAll('line')
        .data(linkData)
        .enter().append('line')
        .attr('class', 'link');

      const nodeGroup = d3.select(g).append('g')
        .selectAll('g')
        .data(nodeData)
        .enter().append('g')
        .attr('class', 'node')
        .call(d3.drag()
          .on('start', (event, d) => {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
          })
          .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
          .on('end', (event, d) => {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null; d.fy = null;
          }));

      nodeGroup.append('circle')
        .attr('r', d => d.radius)
        .attr('fill', d => nodeColor(d))
        .attr('stroke', '#fff')
        .attr('stroke-width', 1);

      nodeGroup.append('text')
        .attr('dx', d => d.radius + 4)
        .attr('dy', '.35em')
        .text(d => d.title || d.id)
        .attr('font-size', '10px')
        .attr('fill', '#e6edf3');

      nodeGroup.on('mouseover', (event, d) => {
        graphTooltip.style.display = 'block';
        graphTooltip.innerHTML = `<strong>${d.title || d.id}</strong><br><span style="color:#8b949e">${d.domain || d.folder || 'general'}</span><br><span style="color:#8b949e">${getNodeLinkCount(d)} link(s)</span>`;
        graphTooltip.style.left = (event.pageX + 12) + 'px';
        graphTooltip.style.top = (event.pageY + 12) + 'px';
      }).on('mouseout', () => {
        graphTooltip.style.display = 'none';
      }).on('click', (event, d) => {
        if (d.path || d.file) window.open(`/api/file?path=${encodeURIComponent(d.path || d.file)}`, '_blank');
      });

      simulation.on('tick', () => {
        linkSel
          .attr('x1', d => d.source.x)
          .attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x)
          .attr('y2', d => d.target.y);
        nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
      });
    }

    // --- Tree View ---
    function renderTree() {
      treeView.innerHTML = '';
      const tree = {};
      filteredNodes.forEach(node => {
        const domain = node.domain || node.folder || 'general';
        if (!tree[domain]) tree[domain] = [];
        tree[domain].push(node);
      });
      Object.keys(tree).sort().forEach(domain => {
        const files = tree[domain].sort((a,b) => (a.title || a.id).localeCompare(b.title || b.id));
        const color = DOMAIN_COLORS[domain] || '#888';
        const domainEl = document.createElement('div');
        domainEl.className = 'tree-domain';
        domainEl.innerHTML = `
          <div class="tree-domain-title">
            <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${color};"></span>
            ${domain} <span style="color:#8b949e;font-weight:400;">(${files.length})</span>
          </div>
          <div class="tree-files">
            ${files.map(f => `<a class="tree-file" href="/api/file?path=${encodeURIComponent(f.path || f.file)}" target="_blank">${f.title || f.id}</a>`).join('')}
          </div>
        `;
        treeView.appendChild(domainEl);
      });
    }

    // --- Table View ---
    function renderTable() {
      const rows = filteredNodes.map(node => {
        const title = node.title || node.id || 'Untitled';
        const domain = node.domain || node.folder || 'general';
        const linkCount = getNodeLinkCount(node);
        const path = node.path || node.file || '';
        return `<tr>
          <td><a href="/api/file?path=${encodeURIComponent(path)}" target="_blank" style="color:var(--accent);text-decoration:none;">${title}</a></td>
          <td><span class="badge badge-${domain.toLowerCase()}">${domain}</span></td>
          <td>${linkCount}</td>
          <td style="color:var(--text-muted);font-size:11px;">${path}</td>
        </tr>`;
      }).join('');
      tableBody.innerHTML = rows;
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
