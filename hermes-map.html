<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Map — 3D Connections</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0a0a1a;
  color: #e8e8f0;
  overflow: hidden;
}

#canvas-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1;
}

.ui-overlay {
  position: fixed;
  z-index: 10;
  pointer-events: none;
}
.ui-overlay > * { pointer-events: auto; }

.top-bar {
  top: 0; left: 0; right: 0;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(10,10,26,0.95);
}
.top-bar h1 {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.controls-bar {
  bottom: 0; left: 0; right: 0;
  padding: 16px 24px;
  display: flex;
  justify-content: center;
  gap: 12px;
  background: linear-gradient(0deg, rgba(10,10,26,0.95) 0%, transparent 100%);
}

.btn {
  background: rgba(22,33,62,0.9);
  border: 1px solid rgba(108,99,255,0.3);
  color: #e8e8f0;
  padding: 10px 20px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.2s;
  backdrop-filter: blur(10px);
}
.btn:hover {
  background: rgba(108,99,255,0.3);
  border-color: #6c63ff;
}
.btn.active {
  background: #6c63ff;
  border-color: #6c63ff;
}
.btn-sm { padding: 6px 12px; font-size: 11px; }

.legend {
  position: fixed;
  top: 70px;
  left: 20px;
  background: rgba(22,33,62,0.9);
  border: 1px solid rgba(108,99,255,0.3);
  border-radius: 12px;
  padding: 14px;
  z-index: 10;
  backdrop-filter: blur(10px);
  max-width: 200px;
}
.legend h3 {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #8888a8;
  margin-bottom: 10px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  font-size: 11px;
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.info-panel {
  position: fixed;
  top: 70px;
  right: 20px;
  width: 280px;
  background: rgba(22,33,62,0.9);
  border: 1px solid rgba(108,99,255,0.3);
  border-radius: 12px;
  padding: 16px;
  z-index: 10;
  backdrop-filter: blur(10px);
  display: none;
}
.info-panel.visible { display: block; }
.info-panel h3 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.info-panel .category-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  text-transform: uppercase;
}
.info-panel p {
  font-size: 12px;
  color: #8888a8;
  line-height: 1.5;
  margin-bottom: 8px;
}
.info-panel .connections-list {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.info-panel .conn-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 0;
  font-size: 11px;
}
.info-panel .conn-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #6c63ff;
}

.view-controls {
  position: fixed;
  bottom: 70px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 10;
}
.view-btn {
  background: rgba(22,33,62,0.9);
  border: 1px solid rgba(108,99,255,0.2);
  color: #e8e8f0;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  transition: all 0.2s;
  text-align: left;
}
.view-btn:hover { background: rgba(108,99,255,0.2); }
.view-btn.active { background: #6c63ff; }

.stats-bar {
  position: fixed;
  bottom: 70px;
  left: 20px;
  display: flex;
  gap: 8px;
  z-index: 10;
}
.stat-chip {
  background: rgba(22,33,62,0.9);
  border: 1px solid rgba(108,99,255,0.2);
  border-radius: 16px;
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 600;
  backdrop-filter: blur(10px);
}
.stat-chip .num { color: #6c63ff; }
</style>
</head>

// Category colors
const CAT_COLORS = {
  'core':      0x00e5ff,  // electric cyan
  'comm':      0xff3333,  // vivid red
  'data':      0xffb800,  // golden amber
  'ai':        0xd500f9,  // neon purple
  'auto':      0x00e676,  // material green
  'external':  0xff4081,  // pink accent
  'device':    0xc0c0c0,  // silver
};

const CAT_NAMES = {
  'core': 'Core Hub',
  'comm': 'Communication',
  'data': 'Data & Docs',
  'ai': 'Intelligence',
  'auto': 'Automation',
  'external': 'External Services',
  'device': 'Devices',
};

let scene, camera, renderer, controls;
let nodeMeshes = [];
let linkMeshes = [];
let autoRotate = true;
let showLinks = true;
let pulseFlow = false;
let currentFilter = 'all';
let raycaster, mouse;

init();
animate();

function init() {
  const container = document.getElementById('canvas-container');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  scene.fog = new THREE.Fog(0x0a0a1a, 25, 60);

  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(18, 12, 18);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.maxPolarAngle = Math.PI / 2.0;
  controls.minDistance = 8;
  controls.maxDistance = 45;
  controls.target.set(0, 0, 0);
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.5;

  // Lights
  scene.add(new THREE.AmbientLight(0x404060, 0.6));
  
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(10, 20, 10);
  scene.add(dir);
  
  const light1 = new THREE.PointLight(0x00e5ff, 0.4, 40);
  light1.position.set(-10, 5, -10);
  scene.add(light1);
  
  const light2 = new THREE.PointLight(0xff4081, 0.4, 40);
  light2.position.set(10, -5, 10);
  scene.add(light2);

  // Build nodes
  NODES.forEach(node => {
    const geometry = new THREE.SphereGeometry(node.size * 0.4, 24, 24);
    const color = CAT_COLORS[node.category] || 0x888888;
    const material = new THREE.MeshStandardMaterial({
      color: color,
      emissive: color,
      emissiveIntensity: 0.15,
      roughness: 0.3,
      metalness: 0.2,
    });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(node.pos[0], node.pos[1], node.pos[2]);
    mesh.userData = node;
    scene.add(mesh);
    nodeMeshes.push(mesh);

    // Glow ring for core
    if (node.category === 'core') {
      const ringGeo = new THREE.RingGeometry(node.size * 0.6, node.size * 0.8, 32);
      const ringMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.copy(mesh.position);
      ring.rotation.x = Math.PI / 2;
      scene.add(ring);
    }
  });

  // Build links
  LINKS.forEach(link => {
    const [fromId, toId, type, label] = link;
    const fromNode = NODES.find(n => n.id === fromId);
    const toNode = NODES.find(n => n.id === toId);
    if (!fromNode || !toNode) return;

    const color = type === 'trigger' ? 0x6c63ff :
                  type === 'sync' ? 0x00d4aa :
                  type === 'output' ? 0xf4a261 :
                  0x555577;

    // Create curved line
    const mid = new THREE.Vector3(
      (fromNode.pos[0] + toNode.pos[0]) / 2,
      (fromNode.pos[1] + toNode.pos[1]) / 2 + 1.5,
      (fromNode.pos[2] + toNode.pos[2]) / 2
    );
    const curve = new THREE.QuadraticBezierCurve3(
      new THREE.Vector3(...fromNode.pos),
      mid,
      new THREE.Vector3(...toNode.pos)
    );
    const points = curve.getPoints(20);
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineBasicMaterial({
      color: color,
      transparent: true,
      opacity: type === 'trigger' ? 0.6 : 0.25,
    });
    const line = new THREE.Line(geometry, material);
    line.userData = { from: fromId, to: toId, type, label };
    scene.add(line);
    linkMeshes.push(line);
  });

  // Raycaster
  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();
  renderer.domElement.addEventListener('click', onNodeClick);

  window.addEventListener('resize', onResize);

  // Update stats
  document.getElementById('statNodes').textContent = NODES.length;
  document.getElementById('statLinks').textContent = LINKS.length;
  document.getElementById('statAuto').textContent = LINKS.filter(l => l[2] === 'trigger' || l[2] === 'sync').length;
}

function onNodeClick(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes);
  
  if (intersects.length > 0) {
    const node = intersects[0].object.userData;
    showNodeInfo(node);
  }
}

function showNodeInfo(node) {
  const panel = document.getElementById('infoPanel');
  document.getElementById('infoTitle').textContent = node.name;
  
  const badge = document.getElementById('infoCategory');
  badge.textContent = CAT_NAMES[node.category] || node.category;
  badge.style.background = '#' + (CAT_COLORS[node.category] || 0x888888).toString(16).padStart(6, '0') + '30';
  badge.style.color = '#' + (CAT_COLORS[node.category] || 0x888888).toString(16).padStart(6, '0');
  
  document.getElementById('infoDesc').textContent = node.desc;
  
  // Find connections
  const conns = LINKS.filter(l => l[0] === node.id || l[1] === node.id);
  const connHtml = conns.map(c => {
    const other = c[0] === node.id ? c[1] : c[0];
    const otherNode = NODES.find(n => n.id === other);
    const typeIcon = c[2] === 'trigger' ? '⚡' : c[2] === 'sync' ? '🔄' : c[2] === 'output' ? '📤' : '📎';
    return `<div class="conn-item"><span class="conn-dot"></span>${typeIcon} ${otherNode?.name || other} <span style="color:#8888a8;margin-left:auto;font-size:10px;">${c[3]}</span></div>`;
  }).join('');
  
  document.getElementById('infoConnections').innerHTML = connHtml;
  panel.classList.add('visible');
}

function setView(view, btn) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  
  switch(view) {
    case 'perspective':
      camera.position.set(18, 12, 18);
      break;
    case 'top':
      camera.position.set(0, 30, 0.1);
      break;
    case 'front':
      camera.position.set(0, 2, 25);
      break;
  }
  controls.target.set(0, 0, 0);
  controls.update();
}

function resetView() {
  setView('perspective');
}

function toggleAutoRotate() {
  autoRotate = !autoRotate;
  controls.autoRotate = autoRotate;
  event.target.classList.toggle('active', autoRotate);
}

function toggleConnections() {
  showLinks = !showLinks;
  linkMeshes.forEach(l => l.visible = showLinks);
  event.target.classList.toggle('active', showLinks);
}

function togglePulse() {
  pulseFlow = !pulseFlow;
  event.target.classList.toggle('active', pulseFlow);
  if (pulseFlow) pulseAnimation();
}

function pulseAnimation() {
  if (!pulseFlow) return;
  
  const time = Date.now() * 0.001;
  linkMeshes.forEach((line, i) => {
    const offset = (time + i * 0.1) % 1;
    line.material.opacity = 0.1 + Math.sin(offset * Math.PI) * 0.5;
  });
  
  if (pulseFlow) requestAnimationFrame(pulseAnimation);
}

function filterCategory(cat, btn) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  
  currentFilter = cat;
  
  nodeMeshes.forEach(mesh => {
    if (cat === 'all') {
      mesh.visible = true;
    } else {
      mesh.visible = mesh.userData.category === cat;
    }
  });
  
  linkMeshes.forEach(line => {
    const fromNode = NODES.find(n => n.id === line.userData.from);
    const toNode = NODES.find(n => n.id === line.userData.to);
    if (cat === 'all') {
      line.visible = showLinks;
    } else {
      line.visible = showLinks && (fromNode?.category === cat || toNode?.category === cat);
    }
  });
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  
  // Subtle node floating
  const time = Date.now() * 0.001;
  nodeMeshes.forEach((mesh, i) => {
    mesh.position.y += Math.sin(time + i) * 0.001;
  });
  
  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// Expose to global scope
window.setView = setView;
window.resetView = resetView;
window.toggleAutoRotate = toggleAutoRotate;
window.toggleConnections = toggleConnections;
window.togglePulse = togglePulse;
window.filterCategory = filterCategory;
</script>
</body>
</html>
