<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fadi Life OS v2.0</title>
<script>/* anti-flash (R13): apply saved theme before first paint */(function(){try{var s=JSON.parse(localStorage.getItem('fb-os-state')||'{}');document.documentElement.setAttribute('data-theme',s.theme||'blueprint');}catch(e){document.documentElement.setAttribute('data-theme','blueprint');}})();</script>
<link rel="icon" type="image/svg+xml" href="assets/logo-option-1-node-network.svg">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="command-bar.css">
<style>
/* Page-specific: Dashboard modules */
.welcome-banner {
  background: linear-gradient(135deg, rgba(88,166,255,0.1), rgba(188,140,255,0.1));
  border: 1px solid var(--accent-border);
  border-radius: var(--radius-2xl);
  padding: var(--space-6);
  margin-bottom: var(--space-6);
}

.welcome-banner h2 {
  font-size: var(--font-size-xl);
  font-weight: 800;
  margin-bottom: var(--space-2);
}

.welcome-banner p {
  color: var(--text-secondary);
  font-size: var(--font-size-base);
}

.quick-actions {
  display: flex;
  gap: var(--space-2);
  margin-top: var(--space-4);
  flex-wrap: wrap;
}

.activity-feed {
  max-height: 300px;
  overflow-y: auto;
}

.activity-item {
  display: flex;
  align-items: flex-start;
  gap: var(--space-3);
  padding: var(--space-3) 0;
  border-bottom: 1px solid var(--border-secondary);
}

.activity-item:last-child { border-bottom: none; }

.activity-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-md);
  background: var(--bg-tertiary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.activity-content { flex: 1; min-width: 0; }
.activity-title { font-size: var(--font-size-sm); font-weight: 600; }
.activity-meta { font-size: var(--font-size-xs); color: var(--text-tertiary); margin-top: 2px; }

/* KPI cards */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-4); margin-bottom: var(--space-6); }
@media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 500px) { .kpi-grid { grid-template-columns: 1fr; } }

.kpi-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-xl);
  padding: var(--space-4);
  text-align: center;
  transition: all var(--transition-base);
}

.kpi-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.kpi-value {
  font-size: 28px;
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: var(--space-1);
}

.kpi-label {
  font-size: var(--font-size-xs);
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
}

.kpi-delta {
  font-size: var(--font-size-xs);
  margin-top: var(--space-1);
  font-weight: 600;
}

/* Sidebar toggle for mobile */
.sidebar-toggle {
  display: none;
  background: none;
  border: 1px solid var(--border-primary);
  color: var(--text-primary);
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-md);
  cursor: pointer;
  font-size: 16px;
}

@media (max-width: 768px) {
  .sidebar-toggle { display: flex; }
}

/* Module content area */
#module-content {
}

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-elevated) 50%, var(--bg-tertiary) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-md);
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
</style>
</head>
