<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Live Use Cases & Prompt Library</title>
<style>
:root {
  --bg: #0d1117; --bg-card: #161b22; --bg-card-hover: #1c2128;
  --border: #30363d; --text: #e6edf3; --text-muted: #8b949e;
  --accent: #58a6ff; --red: #f85149; --green: #3fb950;
  --purple: #bc8cff; --cyan: #39d2c0; --pink: #f778ba; --orange: #d29922; --yellow: #e3b341;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 16px; font-weight: 700; }
/* Back button styled via shared.css */
.header-actions { display: flex; gap: 8px; align-items: center; }
.refresh-btn { background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; transition: all 0.15s; }
.refresh-btn:hover { color: var(--accent); border-color: var(--accent); }
.refresh-btn.loading { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.container { max-width: 1100px; margin: 0 auto; padding: 20px; }

/* Stats bar */
.stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
@media (max-width: 700px) { .stats-bar { grid-template-columns: repeat(2, 1fr); } }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
.stat-card .stat-num { font-size: 22px; font-weight: 800; }
.stat-card .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.stat-card.accent .stat-num { color: var(--accent); }
.stat-card.green .stat-num { color: var(--green); }
.stat-card.purple .stat-num { color: var(--purple); }
.stat-card.cyan .stat-num { color: var(--cyan); }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
.tab {
  padding: 7px 16px; border-radius: 7px; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-muted); font-size: 12px;
  font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.tab:hover { color: var(--text); border-color: var(--accent); }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.tab .tab-count { background: rgba(255,255,255,0.15); padding: 1px 6px; border-radius: 8px; font-size: 10px; margin-left: 4px; }

/* Search */
.search-box {
  width: 100%; padding: 10px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg); color: var(--text);
  font-size: 13px; outline: none; margin-bottom: 14px;
}
.search-box:focus { border-color: var(--accent); }

/* Filter chips */
.filter-chips { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.chip {
  padding: 4px 10px; border-radius: 14px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--border); background: var(--bg-card); color: var(--text-muted);
  cursor: pointer; transition: all 0.15s;
}
.chip:hover { border-color: var(--accent); color: var(--text); }
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Grid */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

/* Cards */
.card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px; cursor: pointer; transition: all 0.15s;
}
.card:hover { border-color: var(--accent); transform: translateY(-1px); }
.card .card-icon { font-size: 22px; margin-bottom: 6px; }
.card .card-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
.card .card-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
.card .card-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.card .card-tag {
  font-size: 9px; padding: 2px 7px; border-radius: 4px;
  background: rgba(88,166,255,0.1); color: var(--accent); font-weight: 600;
}
.card .card-tag.green { background: rgba(63,185,80,0.1); color: var(--green); }
.card .card-tag.purple { background: rgba(188,140,255,0.1); color: var(--purple); }
.card .card-tag.cyan { background: rgba(57,210,192,0.1); color: var(--cyan); }
.card .card-tag.orange { background: rgba(210,153,34,0.1); color: var(--orange); }
.card .card-source { font-size: 9px; color: var(--text-muted); margin-top: 6px; }

/* Prompt card */
.prompt-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.prompt-card:hover { border-color: var(--accent); }
.prompt-card .prompt-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.prompt-card .prompt-text {
  background: rgba(0,0,0,0.25); border: 1px solid var(--border); border-radius: 6px;
  padding: 10px; font-size: 11px; font-family: 'SF Mono', monospace;
  color: var(--text); line-height: 1.5; white-space: pre-wrap; max-height: 200px; overflow-y: auto;
}
.prompt-card .copy-btn {
  margin-top: 8px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--accent); font-size: 11px; font-weight: 600; cursor: pointer;
  transition: all 0.15s;
}
.prompt-card .copy-btn:hover { background: var(--accent); color: #fff; }
.prompt-card .copy-btn.copied { background: var(--green); color: #fff; border-color: var(--green); }
.prompt-card .prompt-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.prompt-card .prompt-tag {
  font-size: 9px; padding: 2px 6px; border-radius: 4px;
  background: rgba(188,140,255,0.1); color: var(--purple); font-weight: 600;
}

/* Detail panel */
.detail-panel {
  display: none; background: var(--bg); border: 1px solid var(--accent);
  border-radius: 10px; padding: 16px; margin-top: 10px;
}
.detail-panel.open { display: block; }
.detail-panel h4 { font-size: 13px; margin-bottom: 8px; color: var(--accent); }
.detail-panel p { font-size: 12px; color: var(--text-muted); line-height: 1.6; margin-bottom: 8px; }
.detail-panel pre {
  background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px;
  font-size: 11px; font-family: 'SF Mono', monospace; color: var(--text);
  overflow-x: auto; margin: 8px 0; line-height: 1.5; white-space: pre-wrap;
}
.detail-panel .close-btn {
  float: right; background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 16px;
}
.detail-panel .close-btn:hover { color: var(--red); }

/* Loading */
.loading-state { text-align: center; padding: 40px; color: var(--text-muted); }
.loading-state .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }

/* Empty state */
.empty-state { text-align: center; padding: 30px; color: var(--text-muted); font-size: 13px; }

/* Updated timestamp */
.updated { font-size: 10px; color: var(--text-muted); text-align: right; margin-top: 20px; }
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="header-back">← Life OS</a>
  <h1>⚡ Live Use Cases & Prompt Library</h1>
  <div class="header-actions">
    <button class="refresh-btn" onclick="loadAll()" id="refreshBtn">↻ Refresh</button>
  </div>
</div>

<div class="container">

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card accent"><div class="stat-num" id="statPages">0</div><div class="stat-label">Total Pages</div></div>
    <div class="stat-card green"><div class="stat-num" id="statActionable">0</div><div class="stat-label">Actionable</div></div>
    <div class="stat-card purple"><div class="stat-num" id="statPrompts">0</div><div class="stat-label">Prompts</div></div>
    <div class="stat-card cyan"><div class="stat-num" id="statDomains">0</div><div class="stat-label">Domains</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Search -->
  <input type="text" class="search-box" placeholder="🔍 Search use cases, prompts, tags..." id="searchInput" oninput="applyFilter()">

  <!-- Filter chips -->
  <div class="filter-chips" id="filterChips"></div>

  <!-- Content -->
  <div id="content">
    <div class="loading-state"><div class="spinner"></div><br>Loading live data from vault...</div>
  </div>

  <div class="updated" id="updated"></div>
</div>

<script>
let DATA = { use_cases: [], prompts: [], stats: {}, updated: '' };
let CURRENT_TAB = 'usecases';
let CURRENT_FILTER = '';
let CURRENT_SEARCH = '';

const DOMAIN_COLORS = {
  'ai-tools': '', 'general': 'green', 'career': 'orange', 'construction': 'cyan',
  'fieldbridgehq': 'purple', 'health': 'pink', 'trading': 'yellow',
  'sources': 'green', 'prompt-library': 'purple'
};

const DOMAIN_ICONS = {
  'ai-tools': '🤖', 'general': '📚', 'career': '💼', 'construction': '🏗️',
  'fieldbridgehq': '🌉', 'health': '💪', 'trading': '📈',
  'sources': '📁', 'prompt-library': '✨'
};

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  btn.textContent = '↻ Loading...';
  try {
    const res = await fetch('/api/use-cases');
    DATA = await res.json();
    renderTabs();
    renderFilters();
    renderContent();
    document.getElementById('updated').textContent = 'Updated: ' + new Date(DATA.updated).toLocaleString();
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="empty-state">⚠️ Failed to load. Is server.py running? ' + e.message + '</div>';
  }
  btn.classList.remove('loading');
  btn.textContent = '↻ Refresh';
}

function renderTabs() {
  const tabs = [
    { id: 'usecases', label: '💡 Use Cases', count: DATA.use_cases.length },
    { id: 'prompts', label: '📝 Prompt Library', count: DATA.prompts.length },
    { id: 'domains', label: '📂 By Domain', count: Object.keys(DATA.stats.domains || {}).length },
  ];
  document.getElementById('tabs').innerHTML = tabs.map(t =>
    `<button class="tab ${CURRENT_TAB === t.id ? 'active' : ''}" onclick="switchTab('${t.id}')">${t.label}<span class="tab-count">${t.count}</span></button>`
  ).join('');
}

function renderFilters() {
  const domains = [...new Set(DATA.use_cases.map(uc => uc.domain))].sort();
  const allTags = [...new Set(DATA.use_cases.flatMap(uc => uc.tags))].sort().slice(0, 15);
  let chips = `<span class="chip ${CURRENT_FILTER === '' ? 'active' : ''}" onclick="setFilter('')">All</span>`;
  domains.forEach(d => {
    chips += `<span class="chip ${CURRENT_FILTER === d ? 'active' : ''}" onclick="setFilter('${d}')">${DOMAIN_ICONS[d] || '📂'} ${d}</span>`;
  });
  document.getElementById('filterChips').innerHTML = chips;
}

function switchTab(tab) {
  CURRENT_TAB = tab;
  renderTabs();
  renderContent();
}

function setFilter(f) {
  CURRENT_FILTER = f;
  renderFilters();
  renderContent();
}

function applyFilter() {
  CURRENT_SEARCH = document.getElementById('searchInput').value.toLowerCase();
  renderContent();
}

function matchesFilter(item) {
  if (CURRENT_FILTER && item.domain !== CURRENT_FILTER) return false;
  if (CURRENT_SEARCH) {
    const haystack = (item.title + ' ' + item.description + ' ' + (item.tags || []).join(' ')).toLowerCase();
    if (!haystack.includes(CURRENT_SEARCH)) return false;
  }
  return true;
}

function renderContent() {
  const container = document.getElementById('content');
  
  // Stats
  document.getElementById('statPages').textContent = DATA.stats.total_pages || 0;
  document.getElementById('statActionable').textContent = DATA.stats.actionable_pages || 0;
  document.getElementById('statPrompts').textContent = DATA.stats.prompt_count || 0;
  document.getElementById('statDomains').textContent = Object.keys(DATA.stats.domains || {}).length;

  if (CURRENT_TAB === 'usecases') {
    const items = DATA.use_cases.filter(matchesFilter);
    if (!items.length) { container.innerHTML = '<div class="empty-state">No use cases match your filter.</div>'; return; }
    container.innerHTML = '<div class="grid">' + items.map(uc => `
      <div class="card" onclick="showDetail('use-case', '${uc.file.replace(/'/g, "\\'")}')">
        <div class="card-icon">${DOMAIN_ICONS[uc.domain] || '📄'}</div>
        <div class="card-title">${uc.title}</div>
        <div class="card-desc">${uc.description || 'No description'}</div>
        <div class="card-meta">
          ${(uc.tags || []).slice(0, 3).map(t => `<span class="card-tag">${t}</span>`).join('')}
          <span class="card-tag ${DOMAIN_COLORS[uc.domain] || ''}">${uc.domain}</span>
        </div>
        <div class="card-source">📂 ${uc.file} · ${uc.words} words</div>
      </div>
    `).join('') + '</div>';
  } else if (CURRENT_TAB === 'prompts') {
    const items = DATA.prompts.filter(matchesFilter);
    if (!items.length) { container.innerHTML = '<div class="empty-state">No prompts match your filter.</div>'; return; }
    container.innerHTML = items.map(p => `
      <div class="prompt-card">
        <div class="prompt-title">${DOMAIN_ICONS[p.domain] || '✨'} ${p.title}</div>
        ${(p.prompts || []).map((prompt, i) => `
          <div class="prompt-text">${escapeHtml(prompt)}</div>
          <button class="copy-btn" onclick="copyPrompt(this, ${i}, '${p.file.replace(/'/g, "\\'")}')">📋 Copy Prompt</button>
        `).join('')}
        <div class="prompt-tags">
          ${(p.tags || []).map(t => `<span class="prompt-tag">${t}</span>`).join('')}
          <span class="prompt-tag">${p.domain}</span>
        </div>
      </div>
    `).join('');
  } else if (CURRENT_TAB === 'domains') {
    const domains = DATA.stats.domains || {};
    const sorted = Object.entries(domains).sort((a, b) => b[1] - a[1]);
    container.innerHTML = '<div class="grid">' + sorted.map(([domain, count]) => `
      <div class="card" onclick="setFilter('${domain}'); switchTab('usecases');">
        <div class="card-icon">${DOMAIN_ICONS[domain] || '📂'}</div>
        <div class="card-title">${domain}</div>
        <div class="card-desc">${count} actionable pages in this domain</div>
        <div class="card-meta"><span class="card-tag ${DOMAIN_COLORS[domain] || ''}">${count} items</span></div>
      </div>
    `).join('') + '</div>';
  }
}

function showDetail(type, file) {
  alert('File: ' + file + '\n\nOpen the file browser to view full content.');
}

function copyPrompt(btn, idx, file) {
  const card = btn.closest('.prompt-card');
  const text = card.querySelectorAll('.prompt-text')[idx].textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy Prompt'; btn.classList.remove('copied'); }, 2000);
  });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Init
loadAll();
</script>
</body>
</html>
