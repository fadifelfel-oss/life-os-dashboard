<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP Servers — Life OS</title>
<script>/* anti-flash (R13): apply saved theme before first paint */(function(){try{var s=JSON.parse(localStorage.getItem('fb-os-state')||'{}');document.documentElement.setAttribute('data-theme',s.theme||'blueprint');}catch(e){document.documentElement.setAttribute('data-theme','blueprint');}})();</script>
<link rel="stylesheet" href="shared.css">
<style>
.mcp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--space-4); }
/* Cards restyled onto .hub-tcard (Builder Session Batch C.12) — the connection status stays a
   local .mcp-status dot+label (not a .hub-tag; it's a live/offline state, not an area pill), now
   sitting inside .hub-tcard-meta, and the card spine is set inline per-card from the same status
   (green = connected) so the two never disagree. */
.mcp-status { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; }
.mcp-status.online { color: var(--green); }
.mcp-status.offline { color: var(--text-muted); }
.mcp-status .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="header-back">← Life OS</a>
  <h1><svg class="icon" width="22" height="22"><use href="assets/lucide-sprite.svg#icon-plug"/></svg> MCP Servers</h1>
</div>
<div class="container">
  <div class="mcp-grid">
    <div class="hub-tcard" style="--ar-accent:var(--green);">
      <div class="hub-tcard-title">File System</div>
      <div class="hub-tcard-desc">Read, write, and search vault files</div>
      <div class="hub-tcard-meta"><span class="mcp-status online"><span class="status-dot" style="background:var(--green);"></span> Connected</span></div>
    </div>
    <div class="hub-tcard" style="--ar-accent:var(--green);">
      <div class="hub-tcard-title">Browser</div>
      <div class="hub-tcard-desc">Navigate the web for research</div>
      <div class="hub-tcard-meta"><span class="mcp-status online"><span class="status-dot" style="background:var(--green);"></span> Connected</span></div>
    </div>
    <div class="hub-tcard" style="--ar-accent:var(--green);">
      <div class="hub-tcard-title">Terminal</div>
      <div class="hub-tcard-desc">Execute shell commands on VPS</div>
      <div class="hub-tcard-meta"><span class="mcp-status online"><span class="status-dot" style="background:var(--green);"></span> Connected</span></div>
    </div>
    <div class="hub-tcard" style="--ar-accent:var(--green);">
      <div class="hub-tcard-title">Obsidian Vault</div>
      <div class="hub-tcard-desc">Direct access to /root/knowledge</div>
      <div class="hub-tcard-meta"><span class="mcp-status online"><span class="status-dot" style="background:var(--green);"></span> Connected</span></div>
    </div>
  </div>
</div>
</body>
</html>
